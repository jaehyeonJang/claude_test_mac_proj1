version: 1

scenarios:
  - id: "TAX-001"
    name: "의뢰 입력 후 AI가 관련 필드 결정"
    given: "의뢰 입력란(textarea)과 '다음' 버튼이 표시된 1단계 화면"
    when: "의뢰 입력란에 구체적인 내용을 입력하고 '다음' 버튼을 클릭한다"
    then: "의뢰 요약이 상단에 표시되고 AI가 결정한 관련 필드와 '분석 요청' 버튼이 표시된 2단계 화면으로 전환된다"
    examples:
      - input:
          request: "프리랜서 소득으로 절세 방법 알려줘"
        expect:
          step2Visible: true
          requestSummaryVisible: true
          analyzeButtonVisible: true
      - input:
          request: "양도소득세 줄이고 싶어요. 작년에 아파트 팔았어요"
        expect:
          step2Visible: true
          requestSummaryVisible: true
          analyzeButtonVisible: true

  - id: "TAX-002"
    name: "모호한 의뢰 입력 시 재입력 안내"
    given: "의뢰 입력란(textarea)과 '다음' 버튼이 표시된 1단계 화면"
    when: "의뢰 입력란에 모호한 내용을 입력하고 '다음' 버튼을 클릭한다"
    then: "1단계 화면이 유지되며 더 구체적인 입력을 요청하는 안내 문구가 표시된다"
    examples:
      - input:
          request: "절세 알려줘"
        expect:
          step1Visible: true
          clarificationMessageVisible: true
      - input:
          request: "세금"
        expect:
          step1Visible: true
          clarificationMessageVisible: true

  - id: "TAX-003"
    name: "2단계 필드 입력 후 분석 요청"
    given: "AI가 결정한 필드들과 '분석 요청' 버튼이 표시된 2단계 화면"
    when: "표시된 필드에 값을 입력하고 '분석 요청' 버튼을 클릭한다"
    then: "보고서 영역에 절세 방안 내용과 [조문 보기] [해석 보기] 탭이 표시된다"
    examples:
      - input:
          fields:
            annualIncome: "5000만원"
            prepaidTax: "300만원"
        expect:
          reportVisible: true
          tabButtons: ["조문 보기", "해석 보기"]
      - input:
          fields:
            annualIncome: "1억원"
            prepaidTax: "0원"
        expect:
          reportVisible: true
          tabButtons: ["조문 보기", "해석 보기"]

  - id: "TAX-004"
    name: "보고서 조문/해석 탭 전환"
    given: "보고서 화면에 [조문 보기] [해석 보기] 탭이 표시되고 기본 탭이 [해석 보기]인 상태"
    when: "[조문 보기] 탭을 클릭한다"
    then: "법령 조문 원문이 표시되고 [해석 보기] 탭 내용은 숨겨진다"
    examples:
      - input:
          clickTab: "조문 보기"
        expect:
          activeTab: "조문 보기"
          statuteTextVisible: true
          interpretationVisible: false
      - input:
          clickTab: "해석 보기"
        expect:
          activeTab: "해석 보기"
          statuteTextVisible: false
          interpretationVisible: true

  - id: "TAX-005"
    name: "채팅으로 추가 질문 후 보고서 재생성"
    given: "보고서가 표시된 화면 하단에 채팅 입력란이 있는 상태"
    when: "채팅 입력란에 추가 질문을 입력하고 전송한다"
    then: "이전 보고서가 새 보고서로 교체되고 채팅 영역에 메시지 내역이 표시된다"
    examples:
      - input:
          chatMessage: "연금저축 공제도 추가해서 다시 분석해줘"
        expect:
          reportRegenerated: true
          chatHistory: ["연금저축 공제도 추가해서 다시 분석해줘", "보고서가 업데이트되었습니다"]
      - input:
          chatMessage: "부양가족이 1명 더 있으면 얼마나 절세되나요?"
        expect:
          reportRegenerated: true
          chatHistoryCount: 2

  - id: "TAX-006"
    name: "히스토리 저장 및 재조회"
    given: "분석 요청 완료 후 보고서가 표시된 화면"
    when: "히스토리 목록에서 이전 항목을 클릭한다"
    then: "해당 시점의 입력값과 보고서가 복원된다"
    examples:
      - input:
          historyItem: 0
        expect:
          formRestored: true
          reportVisible: true
          historyItemCount: 1
      - input:
          refreshPage: true
        expect:
          historyItemCount: 1

  - id: "TAX-007"
    name: "다크모드 토글"
    given: "화면 우상단에 다크모드 토글 버튼이 표시된 라이트모드 상태"
    when: "다크모드 토글 버튼을 클릭한다"
    then: "전체 화면이 다크 테마로 전환되고 상태가 localStorage에 저장된다"
    examples:
      - input:
          toggleDarkMode: true
        expect:
          theme: "dark"
          darkModeStored: true
      - input:
          toggleDarkMode: false
        expect:
          theme: "light"
          darkModeStored: true

  - id: "TAX-008"
    name: "분석 요청 중 로딩 인디케이터 표시"
    given: "AI가 결정한 필드가 표시된 2단계 화면"
    when: "필드를 입력하고 '분석 요청' 버튼을 클릭한다"
    then: "보고서가 표시되기 전 로딩 인디케이터가 화면에 나타난다"
    examples:
      - input:
          fields:
            annualIncome: "5000만원"
          clickAnalyze: true
        expect:
          loadingIndicatorVisible: true
          reportVisible: false

  - id: "TAX-009"
    name: "채팅 전송 후 보고서 재생성 중 로딩 인디케이터 표시"
    given: "보고서가 표시된 화면 하단에 채팅 입력란이 있는 상태"
    when: "채팅 입력란에 질문을 입력하고 전송한다"
    then: "재생성 완료 전 로딩 인디케이터가 화면에 나타난다"
    examples:
      - input:
          chatMessage: "부양가족이 2명이면 어떻게 달라지나요?"
        expect:
          loadingIndicatorVisible: true

  - id: "TAX-010"
    name: "분석 완료 후 히스토리 목록 자동 추가"
    given: "2단계에서 '분석 요청'을 눌러 보고서가 표시된 직후 상태"
    when: "히스토리 목록 영역을 확인한다"
    then: "요청 시각과 의뢰 내용 앞부분이 표시된 히스토리 항목이 목록에 추가된다"
    examples:
      - input:
          request: "프리랜서 소득으로 절세 방법 알려줘"
          fields:
            annualIncome: "5000만원"
        expect:
          historyItemCount: 1
          historyItemRequestVisible: true
          historyItemTimestampVisible: true

  - id: "TAX-011"
    name: "다크모드 초기값 OS 설정 연동"
    given: "localStorage에 다크모드 설정이 없는 상태에서 페이지에 최초 진입한다"
    when: "화면이 로드된다"
    then: "OS 다크모드 설정에 맞는 테마가 자동으로 적용된다"
    examples:
      - input:
          osDarkMode: true
          localStorageDarkMode: null
        expect:
          theme: "dark"
      - input:
          osDarkMode: false
          localStorageDarkMode: null
        expect:
          theme: "light"

  - id: "TAX-012"
    name: "1단계 AI 분석 중 로딩 인디케이터 표시"
    given: "의뢰 입력란에 구체적인 내용이 입력된 1단계 화면"
    when: "'다음' 버튼을 클릭한다"
    then: "2단계로 전환되기 전까지 로딩 인디케이터가 표시되고 '다음' 버튼이 비활성화된다"
    examples:
      - input:
          request: "프리랜서 소득으로 절세 방법 알려줘"
          clickNext: true
        expect:
          loadingIndicatorVisible: true
          nextButtonDisabled: true
          step2Visible: false

  - id: "TAX-013"
    name: "2단계 의뢰 요약 읽기 전용 표시"
    given: "1단계에서 구체적인 의뢰를 입력하고 2단계로 전환된 화면"
    when: "2단계 상단 의뢰 요약 영역을 확인한다"
    then: "입력한 의뢰 내용이 읽기 전용 텍스트로 표시되고 편집할 수 없다"
    examples:
      - input:
          request: "프리랜서 소득으로 절세 방법 알려줘"
        expect:
          requestSummaryText: "프리랜서 소득으로 절세 방법 알려줘"
          requestSummaryEditable: false
      - input:
          request: "양도소득세 줄이고 싶어요. 작년에 아파트 팔았어요"
        expect:
          requestSummaryText: "양도소득세 줄이고 싶어요. 작년에 아파트 팔았어요"
          requestSummaryEditable: false

  - id: "TAX-014"
    name: "모호한 의뢰 안내 문구 텍스트 및 입력란 활성 상태"
    given: "의뢰 입력란에 모호한 내용을 입력하고 '다음'을 클릭한 1단계 화면"
    when: "안내 메시지 영역을 확인한다"
    then: "'의뢰 내용이 모호합니다. 구체적인 상황을 입력해주세요' 문구가 표시되고 의뢰 입력란이 편집 가능한 상태로 유지된다"
    examples:
      - input:
          request: "절세 알려줘"
        expect:
          clarificationMessage: "의뢰 내용이 모호합니다. 구체적인 상황을 입력해주세요"
          requestInputEditable: true
          requestInputValue: "절세 알려줘"
      - input:
          request: "세금"
        expect:
          clarificationMessage: "의뢰 내용이 모호합니다. 구체적인 상황을 입력해주세요"
          requestInputEditable: true
          requestInputValue: "세금"

  - id: "TAX-015"
    name: "히스토리 레이블 의뢰 내용 20자 잘림 표시"
    given: "20자를 초과하는 의뢰로 보고서를 생성한 직후 화면"
    when: "히스토리 목록 영역을 확인한다"
    then: "히스토리 항목 레이블에 의뢰 내용 앞 20자만 표시된다"
    examples:
      - input:
          request: "프리랜서 소득세와 부가가치세를 동시에 절감할 수 있는 방법을 알려주세요"
        expect:
          historyItemLabelText: "프리랜서 소득세와 부가가치세를 동시"

  - id: "TAX-016"
    name: "다크모드 localStorage 저장값 새로고침 후 복원"
    given: "다크모드를 활성화한 후 localStorage에 다크모드 설정이 저장된 상태"
    when: "페이지를 새로고침한다"
    then: "localStorage에 저장된 다크모드 설정이 OS 설정과 무관하게 적용된다"
    examples:
      - input:
          localStorageDarkMode: "dark"
          osDarkMode: false
        expect:
          theme: "dark"
      - input:
          localStorageDarkMode: "light"
          osDarkMode: true
        expect:
          theme: "light"
